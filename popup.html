<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cortex</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons">
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <div class="container">
    <div class="header">
      <div class="header-content">
        <i class="material-icons app-icon">block</i>
        <div class="header-text">
          <h1>Cortex</h1>
          <p>Block distracting elements</p>
        </div>
      </div>
    </div>

    <div class="content">
      <div class="toggle-section">
        <div class="toggle-info">
          <h2>Extension Status</h2>
          <p id="status-text">Blocking enabled</p>
        </div>
        <label class="toggle-switch">
          <input type="checkbox" id="toggle" checked>
          <span class="toggle-slider"></span>
        </label>
      </div>

      <div class="divider"></div>

      <div class="info-section">
        <h3>Active Blocking Rules</h3>
        <div class="rules-list">
          <div class="rule-item">
            <i class="material-icons rule-icon">block</i>
            <div class="rule-info">
              <span class="rule-site">YouTube</span>
              <span class="rule-desc">Shorts, Reels, Recommendations</span>
            </div>
          </div>
          <div class="rule-item">
            <i class="material-icons rule-icon">block</i>
            <div class="rule-info">
              <span class="rule-site">Reddit</span>
              <span class="rule-desc">Recommended posts, Ads</span>
            </div>
          </div>
          <div class="rule-item">
            <i class="material-icons rule-icon">block</i>
            <div class="rule-info">
              <span class="rule-site">X (Twitter)</span>
              <span class="rule-desc">Sidebar, Trending topics</span>
            </div>
          </div>
        </div>
        <p class="edit-note">
          <i class="material-icons">info</i>
          Edit blocking rules in <code>content.js</code>
        </p>
      </div>
    </div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
