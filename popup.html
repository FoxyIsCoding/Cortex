<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cortex</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons">
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <div class="container">
    <div class="header">
      <div class="header-content">
        <i class="material-icons app-icon">block</i>
        <div class="header-text">
          <h1>Cortex</h1>
          <p>Block distracting elements</p>
        </div>
      </div>
    </div>

    <div class="content">
      <div class="toggle-section">
        <div class="toggle-info">
          <h2>Extension Status</h2>
          <p id="status-text">Blocking enabled</p>
        </div>
        <label class="toggle-switch">
          <input type="checkbox" id="toggle" checked>
          <span class="toggle-slider"></span>
        </label>
      </div>

      <div class="divider"></div>

      <div class="dev-mode-section">
        <div class="toggle-info">
          <h3>Developer Mode</h3>
          <p id="dev-mode-text">Select elements to hide</p>
        </div>
        <label class="toggle-switch">
          <input type="checkbox" id="dev-mode-toggle">
          <span class="toggle-slider"></span>
        </label>
      </div>

      <div class="dev-mode-actions" id="dev-mode-actions" style="display: none;">
        <button class="dev-action-button" id="export-rules-btn">
          <i class="material-icons">download</i>
          <span>Export Rules</span>
        </button>
        <button class="dev-action-button" id="clear-rules-btn">
          <i class="material-icons">clear_all</i>
          <span>Clear Custom Rules</span>
        </button>
      </div>

      <div class="divider"></div>

      <div class="info-section">
        <h3>Active Blocking Rules</h3>
        <div class="rules-list" id="active-rules-list">
          <!-- Dynamically populated -->
        </div>
        <p class="edit-note">
          <i class="material-icons">info</i>
          Edit blocking rules in <code>content.js</code>
        </p>
      </div>

      <div class="divider"></div>

      <!-- Settings Menu -->
      <div class="settings-menu">
        <button class="settings-trigger" id="settings-trigger">
          <i class="material-icons">settings</i>
          <span>Settings</span>
          <i class="material-icons expand-icon">expand_more</i>
        </button>
        
        <div class="settings-content" id="settings-content">
          <div class="settings-section">
            <h3>Appearance</h3>
            
            <div class="setting-item">
              <div class="setting-label">
                <span class="setting-title">Color Theme</span>
                <span class="setting-description">Customize the extension's color scheme</span>
              </div>
            </div>
            
            <div class="theme-grid">
              <button class="theme-card active" data-theme="purple">
                <div class="theme-preview">
                  <div class="theme-color theme-color-primary"></div>
                  <div class="theme-color theme-color-secondary"></div>
                  <div class="theme-color theme-color-tertiary"></div>
                </div>
                <div class="theme-name">Purple</div>
                <i class="material-icons check-icon">check_circle</i>
              </button>
              
              <button class="theme-card" data-theme="blue">
                <div class="theme-preview">
                  <div class="theme-color theme-color-primary"></div>
                  <div class="theme-color theme-color-secondary"></div>
                  <div class="theme-color theme-color-tertiary"></div>
                </div>
                <div class="theme-name">Blue</div>
                <i class="material-icons check-icon">check_circle</i>
              </button>
              
              <button class="theme-card" data-theme="green">
                <div class="theme-preview">
                  <div class="theme-color theme-color-primary"></div>
                  <div class="theme-color theme-color-secondary"></div>
                  <div class="theme-color theme-color-tertiary"></div>
                </div>
                <div class="theme-name">Green</div>
                <i class="material-icons check-icon">check_circle</i>
              </button>
              
              <button class="theme-card" data-theme="red">
                <div class="theme-preview">
                  <div class="theme-color theme-color-primary"></div>
                  <div class="theme-color theme-color-secondary"></div>
                  <div class="theme-color theme-color-tertiary"></div>
                </div>
                <div class="theme-name">Red</div>
                <i class="material-icons check-icon">check_circle</i>
              </button>
              
              <button class="theme-card" data-theme="orange">
                <div class="theme-preview">
                  <div class="theme-color theme-color-primary"></div>
                  <div class="theme-color theme-color-secondary"></div>
                  <div class="theme-color theme-color-tertiary"></div>
                </div>
                <div class="theme-name">Orange</div>
                <i class="material-icons check-icon">check_circle</i>
              </button>
              
              <button class="theme-card" data-theme="teal">
                <div class="theme-preview">
                  <div class="theme-color theme-color-primary"></div>
                  <div class="theme-color theme-color-secondary"></div>
                  <div class="theme-color theme-color-tertiary"></div>
                </div>
                <div class="theme-name">Teal</div>
                <i class="material-icons check-icon">check_circle</i>
              </button>
              
              <button class="theme-card" data-theme="pink">
                <div class="theme-preview">
                  <div class="theme-color theme-color-primary"></div>
                  <div class="theme-color theme-color-secondary"></div>
                  <div class="theme-color theme-color-tertiary"></div>
                </div>
                <div class="theme-name">Pink</div>
                <i class="material-icons check-icon">check_circle</i>
              </button>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
